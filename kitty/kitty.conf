# --- 字體設定 ---
# 建議使用 JetBrains Mono，如果沒裝，系統會自動抓 fallback
font_family      monospace
bold_font        auto
italic_font      auto
bold_italic_font auto

# 字體大小，2K 螢幕建議 13.0 或 14.0 看起來比較舒服
font_size 13.0

# --- 視窗外觀 ---
# 稍微透明一點點點，看起來比較帥 (0.0 - 1.0)
background_opacity 0.9
# 視窗邊距，讓文字不要貼著邊緣
window_padding_width 10

# --- 性能優化 ---
# 關閉惱人的嗶嗶聲
enable_audio_bell no

